<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f7f2" />
    <meta name="description" content="Monitora allenamenti, storico e progressi in palestra." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>GymBoard - Dashboard palestra</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#home" aria-label="GymBoard home">
          <span class="brand-mark" aria-hidden="true">G</span>
          <span>GymBoard</span>
        </a>
        <div class="topbar-actions">
          <span class="user-badge" id="user-badge" hidden></span>
          <button class="icon-button" id="logout-button" type="button" hidden>Esci</button>
          <button class="icon-button" id="install-button" type="button" hidden>Installa</button>
        </div>
      </header>

      <main id="app" tabindex="-1"></main>

      <nav class="bottom-nav" aria-label="Navigazione principale">
        <a href="#home" data-route="home">
          <span class="nav-icon" aria-hidden="true">⌂</span>
          <span>Home</span>
        </a>
        <a href="#workouts" data-route="workouts">
          <span class="nav-icon" aria-hidden="true">＋</span>
          <span>Allenamenti</span>
        </a>
        <a href="#history" data-route="history">
          <span class="nav-icon" aria-hidden="true">≡</span>
          <span>Storico</span>
        </a>
        <a href="#progress" data-route="progress">
          <span class="nav-icon" aria-hidden="true">↗</span>
          <span>Progressi</span>
        </a>
      </nav>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
